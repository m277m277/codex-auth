name: CI

on:
  push:
    branches:
      - "main"
  pull_request:
    branches:
      - "main"

permissions:
  contents: read

jobs:
  classify:
    name: Classify commit
    runs-on: ubuntu-latest
    outputs:
      skip_release: ${{ steps.release.outputs.skip_release }}
    steps:
      - id: release
        env:
          EVENT_NAME: ${{ github.event_name }}
          HEAD_MESSAGE: ${{ github.event.head_commit.message }}
        run: |
          if [[ "$EVENT_NAME" == "push" && "$HEAD_MESSAGE" == chore:\ release\ v* ]]; then
            echo "skip_release=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip_release=false" >> "$GITHUB_OUTPUT"
          fi

  build-test:
    name: Build & Test (${{ matrix.os }})
    needs: classify
    if: ${{ needs.classify.outputs.skip_release != 'true' }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0

      - name: Zig test
        run: |
          zig version
          zig build test
